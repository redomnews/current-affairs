<!DOCTYPE html>
<html>
<head>
  <title>REDOM NEWS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background: #f5f5f5; padding: 20px; }
    h1 { text-align:center; color: #1a73e8; }
   .news-card { background: white; border-radius: 10px; padding: 20px; margin: 15px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
   .news-date { color: #1a73e8; font-size: 14px; font-weight: bold; }
  </style>
</head>
<body>

<h1>🔥 REDOM NEWS DAILY</h1>
<div id="news-container">Loading...</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzUUygmhOG5POd4XbhVaMcoyW6GFaoxqImYPutdbvq3Hcr-H9p5ivW9WUmGGZaTgH4/exec';

fetch(API_URL)
 .then(res => res.json())
 .then(data => {
    let html = '';
    data.reverse().forEach(news => {
      html += `
      <div class="news-card">
        <p class="news-date">📅 ${news.date}</p>
        <p>${news.news}</p>
      </div>
      `;
    });
    document.getElementById('news-container').innerHTML = html;
  })
 .catch(err => {
    document.getElementById('news-container').innerHTML = '<p style="color:red;">Error: News load nahi hui</p>';
  });
</script>

</body>
</html>
